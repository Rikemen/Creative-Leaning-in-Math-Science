<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baseball Form Analyzer (MVP)</title>
    <!-- p5.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/2.0.5/p5.min.js"
        integrity="sha512-jOTg6ikYiHx1LvbSOucnvZi4shXbaovZ91+rfViIiUFLgAJK+k1oQtGEaLvDB8rsZwEfUksTgmhrxdvEDykuzQ=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <!-- ml5 -->
    <script src="https://unpkg.com/ml5@latest/dist/ml5.min.js"></script>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- ローディング表示: setup()完了後にJSで非表示にする -->
    <div id="loading-overlay" style="
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgb(224, 229, 236);
        z-index: 9999;
        font-family: 'Inter', sans-serif;
        font-size: 1.25rem;
        color: #555;
        letter-spacing: 0.05em;
    ">
        <style>
            @keyframes dot-bounce {
                0%, 80%, 100% { transform: translateY(0); }
                40% { transform: translateY(-8px); }
            }
            .loading-dot {
                display: inline-block;
                animation: dot-bounce 1.2s ease-in-out infinite;
            }
            .loading-dot:nth-child(2) { animation-delay: 0.15s; }
            .loading-dot:nth-child(3) { animation-delay: 0.3s; }
            .loading-dot:nth-child(4) { animation-delay: 0.45s; }
        </style>
        Loading<span class="loading-dot">.</span><span class="loading-dot">.</span><span class="loading-dot">.</span>
    </div>

    <script src="AngleCalculator.js"></script>
    <script src="VideoPlayer.js"></script>
    <script src="sketch.js"></script>
</body>

</html>
