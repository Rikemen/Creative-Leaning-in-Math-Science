<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Squat Maze</title>
  <link rel="stylesheet" href="./style.css">

  <!--
    p5.js（グローバルモード）を先に読み込む。
    main.js がインスタンスモードで new p5(sketch) するため、
    p5 コンストラクタがグローバルに存在している必要がある。
    defer を使わず通常ロードにする。
  -->
  <script src="https://unpkg.com/ml5@1/dist/ml5.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/p5@2.2.2/lib/p5.min.js"></script>

  <!--
    main.js は type="module" で読み込む。
    モジュール内で Firebase ESM CDN を import する構造のため。
  -->
  <script type="module" src="./js/game.js"></script>
</head>

<body>
  <!-- ローディング画面: ml5/p5 のダウンロード前に即座に表示される -->
  <div id="loading-screen" style="
    position: fixed; inset: 0; z-index: 9999;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    background: #000; color: #fff;
    font-family: 'Inter', sans-serif;
  ">
    <div style="font-size: 20px; font-weight: bold; letter-spacing: 4px; margin-bottom: 16px;">
      🎮 SQUAT MAZE
    </div>
    <div style="
      font-size: 12px; letter-spacing: 2px;
      color: rgba(255,255,255,0.6);
      animation: pulse 1.5s ease-in-out infinite;
    ">Now Loading...</div>
  </div>
  <style>
    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }
  </style>
</body>

</html>
